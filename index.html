<!DOCTYPE html>
<html>
<head>
    <title>NICE NDE Tableau Connector</title>
    <meta http-equiv="Cache-Control" content="no-store" />
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js" type="text/javascript"></script>
    <script src="https://connectors.tableau.com/libs/tableauwdc-2.3.latest.js" type="text/javascript"></script>
    <script src="nice-wdc.js" type="text/javascript"></script>
</head>
<body class="container">
    <div class="row">
        <div class="col-md-6 col-md-offset-3">
            <h3 class="text-center">NICE NDE Connector</h3>
            <div class="well">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Enter NICE Username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter NICE Password">
                </div>
                <div class="form-group">
                    <label for="apiKey">API Key</label>
                    <input type="text" class="form-control" id="apiKey" placeholder="Enter NICE API Key">
                </div>
                <button type="button" id="submitButton" class="btn btn-primary btn-block">Connect to NICE</button>
            </div>
        </div>
    </div>
</body>
</html>
